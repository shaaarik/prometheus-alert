global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'telegram'

receivers:
  - name: 'telegram'
    webhook_configs:
      - url: 'https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage'
        send_resolved: true
        http_config:
          headers:
            Content-Type: 'application/json'
        message: |
          {
            "chat_id": "${TELEGRAM_CHAT_ID}",
            "text": "*AlertManager*\n\n*Status:* {{ .Status | toUpper }}\n*Alert:* {{ .CommonLabels.alertname }}\n*Severity:* {{ .CommonLabels.severity }}\n*Description:* {{ .CommonAnnotations.description }}\n*Instance:* {{ .CommonLabels.instance }}\n*Time:* {{ .StartsAt | reReplaceAll \"T\" \" \" | reReplaceAll \"Z\" \" UTC\" }}",
            "parse_mode": "Markdown",
            "disable_web_page_preview": true
          }

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']