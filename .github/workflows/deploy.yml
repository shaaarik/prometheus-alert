name: Deploy with Docker Compose

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    environment:
      name: Env 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - name: Stop and remove old containers
        working-directory: ./prometheus-alert
        run: docker-compose down || true

      - name: Build and deploy with Docker Compose
        working-directory: ./prometheus-alert
        run: docker-compose up -d --build
      
      - name: Create virtual environment
        run: |
          python -m venv venv
          echo "✅ Virtual environment created"

      - name: Activate venv and install dependencies
        run: |
          source venv/bin/activate
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run deployment script
        run: |
          source venv/bin/activate
          python metrics.py > metrics.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MARZBAN_URL: ${{ vars.MARZBAN_URL }}
          MARZBAN_USERNAME: ${{ secrets.MARZBAN_USERNAME }}
          MARZBAN_PASSWORD: ${{ secrets.MARZBAN_PASSWORD }}
          PUSHGATEWAY_URL1: ${{ vars.PUSHGATEWAY_URL1 }}
          PUSHGATEWAY_URL2: ${{ vars.PUSHGATEWAY_URL2 }}
          CLIENT_CERT_PATH: ${{ vars.CLIENT_CERT_PATH }}
          CLIENT_KEY_PATH: ${{ vars.CLIENT_KEY_PATH }}
      

      # - name: Prune unused images
      #   run: docker image prune -f